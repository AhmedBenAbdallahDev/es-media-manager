<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="retro-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0080" />
      <stop offset="100%" style="stop-color:#7928CA" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="240" stroke="url(#retro-grad)" stroke-width="8" fill="rgba(0,0,0,0.8)" />
  
  <!-- Arcade Cabinet Shape -->
  <path d="M160 120 L352 120 L384 180 L384 400 L128 400 L128 180 Z" fill="url(#retro-grad)" opacity="0.2" />
  <path d="M160 120 L352 120 L384 180 L384 400 L128 400 L128 180 Z" stroke="url(#retro-grad)" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Screen Area -->
  <rect x="180" y="150" width="152" height="120" rx="4" fill="#000" stroke="url(#retro-grad)" stroke-width="2" />
  
  <!-- Glitch lines in screen -->
  <line x1="185" y1="170" x2="327" y2="170" stroke="url(#retro-grad)" stroke-width="1" opacity="0.5" />
  <line x1="185" y1="200" x2="327" y2="200" stroke="url(#retro-grad)" stroke-width="1" opacity="0.3" />
  <line x1="185" y1="230" x2="327" y2="230" stroke="url(#retro-grad)" stroke-width="1" opacity="0.5" />

  <!-- Joystick -->
  <circle cx="210" cy="330" r="15" fill="url(#retro-grad)" filter="url(#glow)" />
  <rect x="206" y="345" width="8" height="20" fill="url(#retro-grad)" />

  <!-- Buttons -->
  <circle cx="260" cy="335" r="8" fill="url(#retro-grad)" />
  <circle cx="285" cy="335" r="8" fill="url(#retro-grad)" />
  <circle cx="310" cy="335" r="8" fill="url(#retro-grad)" />
  <circle cx="272" cy="355" r="8" fill="url(#retro-grad)" />
  <circle cx="297" cy="355" r="8" fill="url(#retro-grad)" />

  <!-- Pixel detail -->
  <rect x="240" y="100" width="32" height="8" fill="url(#retro-grad)" />
  <rect x="248" y="92" width="16" height="8" fill="url(#retro-grad)" />
</svg>